name: go
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: buildozer android debug
      - uses: actions/upload-artifact@v2
        with:
          name: mon-appli
          path: bin/*.apk
          
