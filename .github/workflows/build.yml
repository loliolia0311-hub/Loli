name: Build
on: [push]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: buildozer android debug
      - uses: actions/upload-artifact@v3
        with:
          name: MonAppli-APK
          path: bin/*.apk
